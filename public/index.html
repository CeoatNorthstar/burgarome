<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Burgarome</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='white'>B</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="omegle">
      <header class="omegle__header">
        <h1 class="omegle__title">Burgarome</h1>
        <p class="omegle__tagline">Talk to strangers</p>
      </header>

      <div class="omegle__body">
        <section class="omegle__left">
          <div class="omegle__stage">
            <video id="remoteVideo" class="omegle__remote" autoplay playsinline></video>
            <div class="omegle__waiting" id="remotePlaceholder">
              <p>Looking for someone…</p>
            </div>
            <div class="omegle__pip">
              <video id="localVideo" autoplay muted playsinline></video>
              <span class="omegle__pip-label">You</span>
            </div>
          </div>

          <div class="omegle__bar">
            <button id="nextButton" class="omegle__next" type="button">Next</button>
            <div id="status" class="omegle__status status--connecting" role="status">
              <span class="status__dot" aria-hidden="true"></span>
              <span class="status-text">Connecting</span>
            </div>
          </div>
        </section>

        <aside class="omegle__chat">
          <div class="omegle__chat-head">Chat</div>
          <div id="messages" class="omegle__messages" aria-live="polite"></div>
          <form id="chatForm" class="omegle__composer">
            <label for="chatInput" class="sr-only">Message</label>
            <input
              id="chatInput"
              name="message"
              type="text"
              maxlength="300"
              placeholder="Type a message"
              autocomplete="off"
            />
            <button type="submit">Send</button>
          </form>
        </aside>
      </div>
    </main>

    <script src="config.js?v=7" defer></script>
    <script src="app.js?v=7" defer></script>
  </body>
</html>
